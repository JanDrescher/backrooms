<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Labyrinth Explorer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #000; overflow: hidden; }
      canvas { display: block; width: 100vw; height: 100vh; touch-action: none; }
      #overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.7);
        color: #fff;
        font-family: monospace;
        font-size: 1.2rem;
        gap: 1rem;
        cursor: pointer;
        user-select: none;
      }
      #overlay h1 { font-size: 2rem; letter-spacing: 0.2em; }
      #overlay p  { opacity: 0.6; font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>
    <div id="overlay">
      <h1>LABYRINTH</h1>
      <p>Klicken zum Starten</p>
      <p style="font-size:0.75rem">WASD · Maus zum Schauen · ESC zum Verlassen</p>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
